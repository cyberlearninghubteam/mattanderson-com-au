<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Bridge -->
  <path d="M28 28c2-3 6-3 8 0" stroke="#e4e4e7" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Left arm -->
  <path d="M4 30H16" stroke="#e4e4e7" stroke-width="3" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M48 30H60" stroke="#e4e4e7" stroke-width="3" stroke-linecap="round"/>
  <!-- Left lens (red) -->
  <rect x="12" y="22" width="18" height="16" rx="4" fill="#dc2626" opacity="0.85"/>
  <rect x="12" y="22" width="18" height="16" rx="4" fill="none" stroke="#fafafa" stroke-width="2"/>
  <!-- Right lens (blue) -->
  <rect x="34" y="22" width="18" height="16" rx="4" fill="#2563eb" opacity="0.85"/>
  <rect x="34" y="22" width="18" height="16" rx="4" fill="none" stroke="#fafafa" stroke-width="2"/>
  <!-- Shine on left lens -->
  <rect x="15" y="25" width="4" height="3" rx="1" fill="white" opacity="0.3"/>
  <!-- Shine on right lens -->
  <rect x="37" y="25" width="4" height="3" rx="1" fill="white" opacity="0.3"/>
</svg>
