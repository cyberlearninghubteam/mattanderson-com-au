<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Red circle (left) -->
  <circle cx="24" cy="32" r="20" fill="#dc2626" opacity="0.85"/>
  <!-- Blue circle (right) -->
  <circle cx="40" cy="32" r="20" fill="#2563eb" opacity="0.85"/>
  <!-- Purple intersection using blend mode -->
  <defs>
    <clipPath id="right-clip">
      <circle cx="40" cy="32" r="20"/>
    </clipPath>
  </defs>
  <circle cx="24" cy="32" r="20" fill="#9333ea" opacity="0.9" clip-path="url(#right-clip)"/>
</svg>
